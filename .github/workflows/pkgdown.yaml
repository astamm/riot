# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.26.x'

      - name: Cache VTK build (Linux)
        uses: actions/cache@v4
        id: cache-vtk
        with:
          path: ~/vtk-install
          key: vtk-9.5.0-linux-${{ runner.arch }}

      - name: Build and install VTK (Linux)
        if: steps.cache-vtk.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y libgl1-mesa-dev libxt-dev
          wget -q https://www.vtk.org/files/release/9.5/VTK-9.5.0.tar.gz
          tar xzf VTK-9.5.0.tar.gz
          mkdir VTK-build && cd VTK-build
          cmake ../VTK-9.5.0 \
            -DCMAKE_INSTALL_PREFIX=$HOME/vtk-install \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_GROUP_ENABLE_Rendering=NO \
            -DVTK_GROUP_ENABLE_Qt=NO \
            -DVTK_GROUP_ENABLE_Views=NO \
            -DVTK_GROUP_ENABLE_Web=NO \
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES \
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES
          make -j$(nproc)
          make install

      - name: Set VTK_DIR
        run: echo "VTK_DIR=$HOME/vtk-install" >> $GITHUB_ENV

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
