# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.26.x'

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Install VTK (macOS)
        if: runner.os == 'macOS'
        run: brew install vtk

      - name: Cache VTK build (Linux)
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        id: cache-vtk
        with:
          path: ~/vtk-install
          key: vtk-9.5.2-linux-${{ runner.arch }}

      - name: Build and install VTK (Linux)
        if: runner.os == 'Linux' && steps.cache-vtk.outputs.cache-hit != 'true'
        run: |
          sudo apt-get install -y libgl1-mesa-dev libxt-dev
          cd /tmp
          wget -q https://www.vtk.org/files/release/9.5/VTK-9.5.2.tar.gz
          tar xzf VTK-9.5.2.tar.gz
          mkdir VTK-build && cd VTK-build
          cmake /tmp/VTK-9.5.2 \
            -DCMAKE_INSTALL_PREFIX=$HOME/vtk-install \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=ON \
            -DVTK_BUILD_ALL_MODULES=OFF \
            -DVTK_GROUP_ENABLE_Rendering=NO \
            -DVTK_GROUP_ENABLE_Qt=NO \
            -DVTK_GROUP_ENABLE_Views=NO \
            -DVTK_GROUP_ENABLE_Web=NO \
            -DVTK_MODULE_ENABLE_VTK_IOLegacy=YES \
            -DVTK_MODULE_ENABLE_VTK_IOXML=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonCore=YES \
            -DVTK_MODULE_ENABLE_VTK_CommonDataModel=YES
          make -j$(nproc)
          make install

      - name: Set VTK_DIR (Linux)
        if: runner.os == 'Linux'
        run: echo "VTK_DIR=$HOME/vtk-install" >> $GITHUB_ENV

      - name: Install VTK (Windows)
        if: runner.os == 'Windows'
        run: pacman -S --noconfirm mingw-w64-ucrt-x86_64-vtk
        shell: C:\rtools45\usr\bin\bash.exe --login -eo pipefail {0}

      - name: Set VTK_DIR (Windows)
        if: runner.os == 'Windows'
        run: |
          vtk_cmake=$(find /ucrt64/lib/cmake -maxdepth 1 -name "vtk-*" -type d | head -1)
          echo "VTK_DIR=$(cygpath -w $vtk_cmake)" >> $GITHUB_ENV
        shell: C:\rtools45\usr\bin\bash.exe --login -eo pipefail {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
